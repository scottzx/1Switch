name: Build & Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to publish assets to (example: v0.0.8)'
        required: false
        type: string
  push:
    branches: [main]
    tags: ['v*']

# 取消同一分支上的旧构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── OTA 构建 (admin-api ARM64 + dist.zip) ───────────────────
  build:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build OTA Package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Inject version into index.html
        run: |
          TAG_NAME="${{ github.event.inputs.release_tag || github.ref_name }}"
          sed -i "s/{{VERSION}}/${TAG_NAME}/g" dist/index.html
          grep 'data-version' dist/index.html

      - name: Create dist.zip
        run: |
          cd dist
          zip -r ../dist.zip .
          cd ..

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Go dependencies
        run: go mod download

      - name: Build admin-api (Linux ARM64)
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="-s -w" -o admin-api ./cmd/admin-api
          file admin-api
          du -sh admin-api

      - name: Upload OTA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ota-artifacts
          path: |
            dist.zip
            admin-api

  # ── 发布 Release ───────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag == '' }}
          generate_release_notes: true
          files: |
            artifacts/ota-artifacts/dist.zip
            artifacts/ota-artifacts/admin-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
